<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Verify your account</title>
    <style>
      body { font-family: Arial, sans-serif; background: #f4f7fb; margin: 0; padding: 0; }
      .container { max-width: 620px; margin: 24px auto; background: #ffffff; border-radius: 16px; overflow: hidden; box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08); }
      .header { background: linear-gradient(135deg, #4f46e5, #8b5cf6); color: white; padding: 24px; text-align: center; }
      .content { padding: 24px; color: #334155; }
      .otp-box { background: #f8fafc; border: 1px dashed #8b5cf6; border-radius: 12px; padding: 16px; text-align: center; font-size: 28px; font-weight: bold; letter-spacing: 6px; color: #111827; margin: 16px 0; }
      .button { display: inline-block; background: linear-gradient(135deg, #4f46e5, #8b5cf6); color: white; text-decoration: none; padding: 12px 18px; border-radius: 999px; margin-top: 12px; }
      .footer { font-size: 12px; color: #64748b; padding: 16px 24px 24px; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h2>Secure your Rapid Resolve account</h2>
      </div>
      <div class="content">
        <p>Hello,</p>
        <p>Use the one-time verification code below to complete your {{ purpose }}.</p>
        <div class="otp-box">{{ otp }}</div>
        <p>This code expires in 10 minutes for your security.</p>
        <a class="button" href="http://localhost:5173/login">Open Rapid Resolve</a>
      </div>
      <div class="footer">
        <p>If you did not request this email, please ignore it.</p>
      </div>
    </div>
  </body>
</html>
